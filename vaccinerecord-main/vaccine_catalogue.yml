hep_a:
  display: "Hepatitis A"
  products:
    - name: "Avaxim"
    - name: "Avaxim Junior"
    - name: "Vaqta"
    - name: "Vaqta Paediatric"
  course_plans:
    - name: "Standard (0, 6 months)"
      doses:
        - label: "Dose 1"
          offset_days: 0
          validity_months: 6
          validity_text: "6 months"
        - label: "Dose 2"
          offset_months: 6
          validity_years: 25
          validity_text: "25 years"


hep_b:
  display: "Hepatitis B"
  notes: "Choose standard or accelerated schedule."
  products:
    - name: "Engerix-B"
    - name: "Engerix-B Paediatric"
  course_plans:
    - name: "Standard (0, 1 month, 6 months)"
      doses:
        - label: "Dose 1"
          offset_days: 0
        - label: "Dose 2"
          offset_months: 1
        - label: "Dose 3"
          offset_months: 6
          validity_years: 5
          validity_text: "5 years"

    - name: "Accelerated (0, 7, 21 days)"
      doses:
        - label: "Dose 1"
          offset_days: 0
        - label: "Dose 2"
          offset_days: 7
        - label: "Dose 3"
          offset_days: 21
          validity_years: 1
          validity_text: "1 year"


hep_b_booster:
